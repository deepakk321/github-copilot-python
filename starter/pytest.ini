[pytest]
# Pytest configuration for Sudoku Game project
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: unit tests for sudoku logic
    integration: integration tests for Flask routes
    slow: slow running tests
